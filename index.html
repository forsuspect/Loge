<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para o Amor da Minha Vida ❤️</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

/* CORAÇÕES */
.heart{
    position:absolute;
    color:#fff;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
        opacity:1;
    }
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

/* CARTA */
.envelope{
    font-size:80px;
    cursor:pointer;
    transition:.4s;
}

.envelope:hover{
    transform:scale(1.1);
}

/* CARTÃO */
.card{
    position:absolute;
    width:90%;
    max-width:420px;
    background:#fff;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
    opacity:0;
    transform:scale(.5);
    transition:.7s;
}

.card.show{
    opacity:1;
    transform:scale(1);
}

.card img{
    width:190px;
    height:190px;
    border-radius:50%;
    object-fit:cover;
    margin-top:15px;
    border:5px solid #ff4d6d;
}

h1{
    color:#ff4d6d;
}

#mensagem{
    color:#444;
    line-height:1.6;
    min-height:120px;
}

</style>
</head>

<body>

<!-- MUSICA -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="envelope" onclick="abrirCarta()">💌</div>

<div class="card" id="carta">
    <h1>Feliz Aniversário ❤️</h1>

    <p id="mensagem"></p>

    <!-- TROCAR FOTO -->
    <img src="foto.jpg">
</div>

<script>

/* TEXTO ROMÂNTICO */
const texto = `Feliz aniversário, meu amor!
Hoje celebro o dia mais especial do mundo,
porque foi o dia em que nasceu a pessoa
que mudou completamente a minha vida.

Seu sorriso ilumina meus dias,
seu abraço é meu lugar seguro
e seu amor é o meu maior presente.

Que nossa história continue linda,
cheia de sonhos, risadas e momentos inesquecíveis.
Eu te amo hoje, amanhã e para sempre ❤️`;

/* ANIMAÇÃO TEXTO */
let i = 0;
function escrever(){
    if(i < texto.length){
        document.getElementById("mensagem").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escrever,35);
    }
}

/* ABRIR CARTA */
function abrirCarta(){
    document.querySelector(".envelope").style.display="none";
    document.getElementById("carta").classList.add("show");

    document.getElementById("musica").play();
    escrever();
}

/* CORAÇÕES CAINDO */
function criarCoracao(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(15+Math.random()*25)+"px";
    heart.style.animationDuration=(3+Math.random()*4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),7000);
}

setInterval(criarCoracao,300);

</script>

</body>
</html>
